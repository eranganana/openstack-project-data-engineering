- hosts: all

  # Common tasks
  tasks:
    - name: Generate hosts file
      lineinfile:
        dest: /etc/hosts
        regexp: ".*{{ item }}$"
        line: "{{ hostvars[item].ansible_default_ipv4.address }} {{item}}"
        state: present
      when: hostvars[item].ansible_default_ipv4.address is defined
      with_items: "{{groups['all']}}"
      become: true

    - name: apt update
      apt: update_cache=yes upgrade=dist
      become: true

    - name: Change ownership of a directory
      file:
        path: /ubuntu
        state: directory
        recurse: yes
        owner: ubuntu
        group: ubuntu
      become: true

    - name: Check if DE2-Project directory exists and delete if so
      stat:
        path: /home/ubuntu/DE2-Project
      register: de2_project_status
      become: true

    - name: Delete DE2-Project directory if it exists
      file:
        path: /home/ubuntu/DE2-Project
        state: absent
      when: de2_project_status.stat.exists
      become: true

    - name: Check if app directory exists and delete if so
      stat:
        path: /home/ubuntu/app
      register: app_status
      become: true

    - name: Delete app directory if it exists
      file:
        path: /home/ubuntu/app
        state: absent
      when: app_status.stat.exists
      become: true

# Production server setup
- hosts: production
  tasks:
    - name: Extra packages
      apt: pkg={{item}} state=latest update_cache=true
      with_items:
        - apt-transport-https
        - ca-certificates
        - curl
        - software-properties-common
        - python3-pip
        - jq
      become: true

    - name: apt update
      apt: update_cache=yes upgrade=dist
      become: true

    - name: Install csvkit
      become: true
      pip:
        name: csvkit
        state: present

    - name: Add Docker repository key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      become: true

    - name: Add Docker repository
      command: add-apt-repository -y "deb [arch=amd64] https://download.docker.com/linux/ubuntu focal stable"
      become: true

    - name: apt update
      apt: update_cache=yes upgrade=dist
      become: true

    # Workaround pip issue with MTU mismatch, see: https://github.com/docker/docker.github.io/pull/9249/files
    # MTU for SNIC is 1450, Docker default is 1500. Override so that Docker matches the host.
    # We create the config file before installing, to avoid any need to restart the docker daemon.
    - name: Create Ansible docker config directory.
      become: true
      file:
        path: "/etc/docker"
        state: directory

    - name: Create Ansible docker file to configure Docker MTU to match SNIC for pip issue
      become: true
      copy:
        dest: "/etc/docker/daemon.json"
        content: |
          {
            "mtu": 1450
          }

    - name: Install Docker
      apt: pkg=docker-ce state=present update_cache=true allow_unauthenticated=yes
      become: true

    - name: Clone repo
      become: true
      command: git clone "https://YOUR_TOKEN_HERE@github.com/mali8800/DE2-Project.git"

    - name: Make fetch script executable
      become: true
      command: chmod +x DE2-Project/production_server/fetch_data.sh

    - name: Fetch static Github data
      become: true
      shell: cd /home/ubuntu/DE2-Project/production_server && ./fetch_data.sh

    - name: Make script executable
      become: true
      command: chmod +x DE2-Project/ci_cd/start_prod_git.sh

    - name: Setup prod directory
      command: DE2-Project/ci_cd/start_prod_git.sh

    - name: Running containers
      shell: cd /home/ubuntu/DE2-Project/production_server && sudo docker compose up -d

# Development server setup
- hosts: development
  tasks:
    - name: Install Python & pip
      apt:
        name: "{{ item }}"
        state: present
      with_items:
        - python3-pip
      become: true

    - name: Upgrade pip
      become: true
      shell: python3 -m pip install pip --upgrade

    - name: Upgrade pyOpenSSL, cryptography, and urllib3
      pip:
        name:
          - pyopenssl
          - urllib3
        state: latest
      become: true

    - name: Install Python packages
      pip:
        executable: pip3
        name: "{{ item }}"
        state: present
      loop:
        - pandas
        - numpy
        - scikit-learn
        - tensorflow==2.10.0
        - keras==2.10.0
        - PyGithub
        - ray[default, tune, data, train]
        - future
        - protobuf==3.20.1
        - joblib
        - xgboost
        - matplotlib
      become: true

    - name: Clone repo
      become: true
      command: git clone "https://YOUR_TOKEN_HERE@github.com/mali8800/DE2-Project.git"

    - name: Generate SSH key
      ansible.builtin.openssh_keypair:
        path: ~/.ssh/id_rsa
        type: rsa
        size: 2048

    - name: Get production server IP
      set_fact:
        prod_server_ip: "{{ hostvars['prod'].ansible_host }}"

    - name: Read the public key into a variable
      slurp:
        path: ~/.ssh/id_rsa.pub
      register: public_key

    - name: Ensure the public key is in the authorized_keys file on production
      lineinfile:
        path: /home/ubuntu/.ssh/authorized_keys
        line: "{{ public_key['content'] | b64decode }}"
        create: yes
        state: present
      become: true
      delegate_to: "{{ prod_server_ip }}"

    - name: Make script executable
      become: true
      command: chmod +x /home/ubuntu/DE2-Project/ci_cd/start_dev_git.sh

    - name: Setup dev directory
      command: /home/ubuntu/DE2-Project/ci_cd/start_dev_git.sh
      environment:
        PRODUCTION_SERVER: "{{ prod_server_ip }}"
      
    - name: Start ray head
      shell: ray start --head > /dev/null 2>&1 &
      async: 10
      poll: 0

- hosts: ray_workers
  tasks:
    - name: Install Python, pip
      apt:
        name: "{{ item }}"
        state: present
      with_items:
        - python3
        - python3-pip
      become: true

    - name: Upgrade pip
      become: true
      shell: python3 -m pip install pip --upgrade

    - name: Upgrade pyOpenSSL, and urllib3
      pip:
        name:
          - pyopenssl
          - urllib3
        state: latest
      become: true

    - name: Install Python packages
      pip:
        name: "{{ item }}"
        executable: pip3
      with_items:
        - pandas
        - numpy
        - scikit-learn
        - ray[default, tune, data, train]
        - xgboost
      become: true

    - name: Get dev server IP
      set_fact:
        dev_server_ip: "{{ hostvars['dev'].ansible_host }}"

    - name: Start Ray worker node
      become: true
      shell: ray start --address="{{ dev_server_ip }}:6379" &
      async: 10
      poll: 0